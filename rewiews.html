<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=device-width, initial-scale=1.0>
    <title>GamEle</title>
    <script type="text/javascript" src="https://vk.com/js/api/openapi.js?168"></script>
    <script type="text/javascript">
        VK.init({apiId: API_ID, onlyWidgets: true});
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container flex-header">
            <form class="search-form">
                <input type="search" placeholder="Поиск...">
                <button type="button"><img src="images/loupe.png" alt="Поиск"></button>
            </form>
            <form>
                <a href="rewiews.html"><button type="button" class="button-left" title="Отзывы"><img src="images/review.png" alt="Отзывы"></button></a>
                <button type="button" class="button-left" title="Каталог игр"><img src="images/gamepad.png" alt="Каталог игр"></button>
            </form>
            <a href="index.html"><div class="logo">GamEle</div></a>
            <form>
                <button type="button" class="button-right"></button>
                <button type="button" class="button-right"></button>
                <button type="button" class="button-right" title="Форум"><img src="images/forum.png" alt="Форум"></button>
            </form>
            <form class="profile-button">
                <button type="button">Профиль</button>
            </form>
        </div>
    </header>
    <section class="comments">
        <div class="container">
            <div class="rewiews-text">Отзывы о нас</div>
            <div class="vk">
                <div id="vk_comments"></div>
                <script type="text/javascript">
                    VK.Widgets.Comments("vk_comments", {limit: 10, attach: "*"});
                </script>
            </div>
        </div>
    </section>
</body>
</html>
